<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <form
            method="post"
            th:action="@{/register}"
            th:object="${registrationRequest}"
            class="form-container"
        >
            <input name="name" th:field="*{name}" placeholder="이름">
            <input name="username" th:field="*{username}" placeholder="아이디">
            <input name="password" th:field="*{password}" type="password" placeholder="비밀번호">
            <button type="submit">회원가입</button>
            <div class="message">
                <div th:if="${error}" th:text="${error}"></div>
                <a href="/login">goto login</a>
            </div>
        </form>
    </div>
</body>
</html>
